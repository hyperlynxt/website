        let activeQuoteIndex = 0;

        const cardColors = ['orange', 'blue', 'emerald', 'purple', 'rose', 'grey'];

        function renderQuotesList() {
            const container = document.getElementById('quote-list-container');
            container.innerHTML = '';

            quotesData.forEach((item, i) => {
                const color = cardColors[i % cardColors.length];
                const isActive = i === activeQuoteIndex ? ' active' : '';

                const button = document.createElement('button');
                button.className = `list-item${isActive} flex items-start p-4 lg:p-5 text-left group relative outline-none mb-3 border border-transparent hover:border-black/5`;
                button.onclick = () => updateQuote(i);
                button.setAttribute('data-theme', item.theme.toLowerCase());
                button.setAttribute('data-author', item.author.toLowerCase());

                button.innerHTML = `
                    <span class="text-[10px] opacity-30 italic font-serif pointer-events-none w-6 mt-0.5" style="min-width: 1.5rem; flex-shrink: 0;">${item.numeral}</span>
                    <div class="flex-1 text-left flex flex-col justify-center overflow-hidden ml-2">
                        <p class="text-lg leading-snug text-[#1A1A18] line-clamp-3 italic pr-4">
                            ${item.quote}
                        </p>
                        <p class="text-[9px] tracking-widest uppercase text-[#7A7A73] mt-2 group-hover:text-[#1A1A18] transition-colors truncate">
                            ${item.author}
                        </p>
                    </div>
                `;
                container.appendChild(button);
            });
        }


        function updateQuote(index) {
            activeQuoteIndex = index;
            const container = document.getElementById('main-content-container');
            const numeral = document.getElementById('main-numeral');
            const buttons = document.querySelectorAll('.list-item');

            container.style.opacity = '0';
            container.style.transform = 'translateY(15px)';
            numeral.style.opacity = '0';

            setTimeout(() => {
                const data = quotesData[index];
                document.getElementById('main-theme').innerText = data.theme;
                document.getElementById('main-quote').innerHTML = data.quote;
                document.getElementById('main-author').innerText = data.author;

                const sourceEl = document.getElementById('main-source');
                if (data.source) {
                    sourceEl.innerText = data.source;
                    sourceEl.style.display = 'block';
                } else {
                    sourceEl.style.display = 'none';
                }

                numeral.innerText = data.numeral;

                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
                numeral.style.opacity = '0.05';

                buttons.forEach((btn, i) => {
                    if (i === index) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            }, 200);
        }

        function navigateQuote(direction) {
            let newIndex = activeQuoteIndex + direction;
            if (newIndex < 0) {
                newIndex = quotesData.length - 1;
            } else if (newIndex >= quotesData.length) {
                newIndex = 0;
            }
            updateQuote(newIndex);

            // Auto scroll to active button on list
            const buttons = document.querySelectorAll('.list-item');
            if (buttons[newIndex]) {
                buttons[newIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // Read URL hash immediately
        const hash = window.location.hash;
        let startIndex = 0;
        if (hash) {
            const parsed = parseInt(hash.replace('#', ''), 10);
            if (!isNaN(parsed) && parsed >= 0 && parsed < quotesData.length) {
                startIndex = parsed;
            }
        }

        // Render quotes first
        renderQuotesList();

        // Set content instantly without animation on first load
        const data = quotesData[startIndex];
        document.getElementById('main-theme').innerText = data.theme;
        document.getElementById('main-quote').innerHTML = data.quote;
        document.getElementById('main-author').innerText = data.author;
        const sourceEl = document.getElementById('main-source');
        if (data.source) { sourceEl.innerText = data.source; sourceEl.style.display = 'block'; }
        else { sourceEl.style.display = 'none'; }
        document.getElementById('main-numeral').innerText = data.numeral;
        activeQuoteIndex = startIndex;
        document.querySelectorAll('.list-item').forEach((btn, i) => {
            if (i === startIndex) btn.classList.add('active');
            else btn.classList.remove('active');
        });

        // Active state helpers for pills
        const categoryPills = document.querySelectorAll('.pill-btn');
        const authorOptions = document.querySelectorAll('.author-option');
        const authorTrigger = document.getElementById('author-trigger');
        const authorMenu = document.getElementById('author-menu');
        const authorLabel = document.getElementById('author-label');
        const activePillClasses = ['bg-inverse', 'text-inverse-text'];
        const inactivePillClasses = ['hover:bg-[#EFEBE4]', 'border', 'border-transparent', 'hover:border-[#1A1A18]/20', 'text-[#4A4A45]', 'hover:text-[#1A1A18]'];

        // Custom dropdown open/close
        authorTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = !authorMenu.classList.contains('hidden');
            authorMenu.classList.toggle('hidden');
            authorTrigger.querySelector('.author-chevron').style.transform = isOpen ? '' : 'rotate(180deg)';
        });
        document.addEventListener('click', () => {
            authorMenu.classList.add('hidden');
            authorTrigger.querySelector('.author-chevron').style.transform = '';
        });

        function setPillActive(pill) {
            pill.classList.remove(...inactivePillClasses);
            pill.classList.add(...activePillClasses);
        }

        function setPillInactive(pill) {
            pill.classList.remove(...activePillClasses);
            pill.classList.add(...inactivePillClasses);
        }

        // Live search — filters list items
        document.getElementById('dive-search').addEventListener('input', function () {
            const query = this.value.trim().toLowerCase();
            const buttons = document.querySelectorAll('.list-item');
            const diveCount = document.getElementById('dive-count');
            let firstMatch = -1;
            let visible = 0;

            if (query) {
                authorOptions.forEach(l => l.classList.remove('active'));
                authorLabel.textContent = "Search Filter...";
                categoryPills.forEach(p => setPillInactive(p));
            } else {
                authorOptions.forEach(l => l.classList.remove('active'));
                authorOptions[0].classList.add('active');
                authorLabel.textContent = authorOptions[0].textContent.trim();
                setPillActive(categoryPills[0]);
            }

            buttons.forEach((btn, i) => {
                const text = btn.textContent.toLowerCase();
                const matches = !query || text.includes(query);
                btn.style.display = matches ? '' : 'none';
                if (matches) {
                    visible++;
                    if (firstMatch === -1) firstMatch = i;
                }
            });

            const total = quotesData.length;
            diveCount.textContent = query
                ? `${String(visible).padStart(2, '0')} of ${String(total).padStart(2, '0')} entries`
                : `${String(total).padStart(2, '0')} Entries`;

            // Switch main view to the first matching quote
            if (firstMatch !== -1 && firstMatch !== activeQuoteIndex) {
                updateQuote(firstMatch);
            }
        });
        // Sidebar Theme Pill Clicks
        categoryPills.forEach(pill => {
            pill.addEventListener('click', e => {
                categoryPills.forEach(p => setPillInactive(p));
                setPillActive(pill);

                // Clear authors filter
                authorOptions.forEach(l => l.classList.remove('active'));
                authorLabel.textContent = "Filtered by Theme...";
                document.getElementById('dive-search').value = '';

                const filter = pill.dataset.filter;
                const buttons = document.querySelectorAll('.list-item');
                const diveCount = document.getElementById('dive-count');
                let firstMatch = -1;
                let visible = 0;

                buttons.forEach((btn, i) => {
                    const theme = btn.dataset.theme || '';
                    const author = btn.dataset.author || '';
                    const matches = !filter || filter === 'all' || theme === filter || author === filter;
                    btn.style.display = matches ? '' : 'none';
                    if (matches) { visible++; if (firstMatch === -1) firstMatch = i; }
                });

                const total = quotesData.length;
                diveCount.textContent = (filter && filter !== 'all')
                    ? `${String(visible).padStart(2, '0')} of ${String(total).padStart(2, '0')} entries`
                    : `${String(total).padStart(2, '0')} Entries`;

                if (firstMatch !== -1 && firstMatch !== activeQuoteIndex) updateQuote(firstMatch);
            });
        });

        // Dropdown Author Option Select
        authorOptions.forEach(opt => {
            opt.addEventListener('click', e => {
                e.preventDefault();
                authorOptions.forEach(l => l.classList.remove('active'));
                opt.classList.add('active');

                // Update Author Button text
                authorLabel.textContent = opt.textContent.trim();

                // Close the author dropdown menu
                authorMenu.classList.add('hidden');
                authorTrigger.querySelector('.author-chevron').style.transform = '';

                // Clear theme pill filter
                categoryPills.forEach(p => setPillInactive(p));
                setPillActive(categoryPills[0]);

                document.getElementById('dive-search').value = '';

                const filter = opt.dataset.filter;
                const buttons = document.querySelectorAll('.list-item');
                const diveCount = document.getElementById('dive-count');
                let firstMatch = -1;
                let visible = 0;

                buttons.forEach((btn, i) => {
                    const theme = btn.dataset.theme || '';
                    const author = btn.dataset.author || '';
                    const matches = !filter || filter === 'all' || theme === filter || author === filter;
                    btn.style.display = matches ? '' : 'none';
                    if (matches) { visible++; if (firstMatch === -1) firstMatch = i; }
                });

                const total = quotesData.length;
                diveCount.textContent = (filter && filter !== 'all')
                    ? `${String(visible).padStart(2, '0')} of ${String(total).padStart(2, '0')} entries`
                    : `${String(total).padStart(2, '0')} Entries`;

                if (firstMatch !== -1 && firstMatch !== activeQuoteIndex) updateQuote(firstMatch);
            });
        });
    </script>
</body>

</html>
