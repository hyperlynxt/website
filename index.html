<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">Interlinked &amp; Intertwined by teo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" vid="5">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" vid="6">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&amp;family=Space+Mono:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet" vid="7">
    
    <style vid="8">
        :root {
            --bg-paper: #E8DFC8;
            --ink-main: #0F1A15;
            --ink-subtle: #4A5A50;
            --accent-matcha: #7B2FBE;
            --accent-blur: rgba(123, 47, 190, 0.4);
            
            --font-display: 'Cormorant Garamond', serif;
            --font-tech: 'Space Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-paper);
            color: var(--ink-main);
            font-family: var(--font-tech);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            opacity: 0.14;
            mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='paperGrain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.38' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='matrix' values='0.95 0.04 0 0 0.02 0.04 0.9 0.03 0 0.02 0.02 0.03 0.82 0 0.02 0 0 0 1 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23paperGrain)'/%3E%3C/svg%3E");
        }

        
        .layout-container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: auto 1fr auto;
            padding: 3rem;
            position: relative;
            z-index: 10;
        }

        
        header {
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
        }

        .author-tag {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
        }

        
        .canvas-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg.constellation {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        
        .constellation-line {
            stroke: var(--ink-subtle);
            stroke-width: 1px;
            stroke-dasharray: 4, 4;
            fill: none;
            opacity: 0.8;
            transition: stroke 0.3s ease;
        }

        .constellation-point {
            fill: var(--bg-paper);
            stroke: var(--ink-subtle);
            stroke-width: 1px;
            r: 4;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .constellation-point:hover {
            fill: var(--accent-matcha);
            stroke: var(--ink-main);
            r: 6;
        }

        .orb {
            fill: var(--accent-matcha);
            filter: blur(40px);
            opacity: 0.8;
            mix-blend-mode: multiply;
            transition: all 1.5s ease-in-out;
            animation: float 10s infinite ease-in-out;
        }

        
        .path-text {
            font-family: var(--font-tech);
            font-size: 0.75rem;
            fill: var(--ink-main);
            text-transform: lowercase;
            letter-spacing: 0.05em;
        }

        
        
        .nav-label {
            position: absolute;
            font-family: var(--font-display);
            font-style: italic;
            font-size: 1.1rem;
            cursor: pointer;
            text-decoration: none;
            color: var(--ink-main);
            transform: translate(-50%, -50%); 
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .nav-label span.num {
            font-family: var(--font-tech);
            font-style: normal;
            font-size: 0.7rem;
            background: var(--ink-main);
            color: var(--bg-paper);
            padding: 2px 6px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .nav-label:hover {
            color: var(--accent-matcha);
            transform: translate(-50%, -50%) scale(1.1);
        }

        
        .nav-1 { top: 20%; left: 30%; }
        .nav-2 { top: 15%; left: 65%; }
        .nav-3 { top: 50%; left: 75%; }
        .nav-4 { top: 80%; left: 60%; }
        .nav-5 { top: 65%; left: 25%; }

        
        .title-block {
            text-align: right;
            position: relative;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 400;
            line-height: 0.9;
            letter-spacing: -0.03em;
            color: var(--ink-main);
            text-transform: uppercase;
            mix-blend-mode: multiply;
        }
        
        .subtitle {
            font-family: var(--font-tech);
            font-size: 0.8rem;
            margin-top: 1rem;
            color: var(--ink-subtle);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -20px); }
            66% { transform: translate(-20px, 10px); }
        }

        @keyframes drawLine {
            from { stroke-dashoffset: 1000; }
            to { stroke-dashoffset: 0; }
        }

        .draw-anim {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 2.5s ease-out forwards;
        }

    </style>
</head>
<body vid="9">

        </div>

    <script vid="56">
        
        const orb = document.querySelector('.orb');
        const container = document.querySelector('.canvas-wrapper');

        container.addEventListener('mousemove', (e) => {
            const { width, height, left, top } = container.getBoundingClientRect();
            const x = ((e.clientX - left) / width) * 100;
            const y = ((e.clientY - top) / height) * 100;
            
            
            const moveX = (x - 35) * 0.2; 
            const moveY = (y - 30) * 0.2; 
            
            orb.style.transform = `translate(${moveX}%, ${moveY}%)`;
        });
    </script>
