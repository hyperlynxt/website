    <style vid="8">
        :root {
            --bg-paper: #121212;
            --ink-main: #e5e0d8;
            --ink-subtle: #a19d94;
            --accent-matcha: #4B0082;
            --accent-blur: rgba(75, 0, 130, 0.6);

            --font-display: 'Cormorant Garamond', serif;
            --font-tech: 'Space Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-paper);
            color: var(--ink-main);
            font-family: var(--font-tech);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }


        .layout-container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: auto 1fr auto;
            padding: 3rem;
            position: relative;
            z-index: 10;
        }


        header {
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
        }

        .author-tag {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
        }


        .canvas-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg.constellation {
            width: 100%;
            height: 100%;
            overflow: visible;
        }


        .constellation-line {
            stroke: var(--ink-subtle);
            stroke-width: 1px;
            stroke-dasharray: 4, 4;
            fill: none;
            opacity: 0.8;
            transition: stroke 0.3s ease;
        }

        .constellation-point {
            fill: var(--bg-paper);
            stroke: var(--ink-subtle);
            stroke-width: 1px;
            r: 4;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .constellation-point:hover {
            fill: var(--accent-matcha);
            stroke: var(--ink-main);
            r: 6;
        }




        .path-text {
            font-family: var(--font-tech);
            font-size: 0.75rem;
            fill: var(--ink-main);
            text-transform: lowercase;
            letter-spacing: 0.05em;
        }



        .nav-label {
            position: absolute;
            font-family: var(--font-display);
            font-style: italic;
            font-size: 2rem;
            cursor: pointer;
            text-decoration: none;
            color: var(--ink-main);
            transform: translate(-50%, -50%);
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .nav-label span.num {
            font-family: var(--font-tech);
            font-style: normal;
            font-size: 1.2rem;
            background: var(--ink-main);
            color: var(--bg-paper);
            padding: 4px 10px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .nav-label:hover {
            color: var(--accent-matcha);
            transform: translate(-50%, -50%) scale(1.1);
            text-shadow: 0 0 8px var(--accent-blur), 0 0 20px var(--accent-blur);
        }


        .nav-1 {
            top: 10%;
            left: 20%;
        }

        .nav-2 {
            top: 10%;
            left: 75%;
        }

        .nav-3 {
            top: 50%;
            left: 85%;
        }

        .nav-4 {
            top: 85%;
            left: 65%;
        }

        .nav-5 {
            top: 70%;
            left: 15%;
        }


        .title-block {
            text-align: left;
            position: relative;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: -0.03em;
            color: var(--ink-main);
        }

        h1 .glow-text {
            color: var(--accent-matcha);
            text-shadow: 0 0 15px var(--accent-matcha), 0 0 30px var(--accent-blur), 0 0 45px var(--accent-blur);
        }

        .subtitle {
            font-family: var(--font-tech);
            font-size: 0.8rem;
            margin-top: 1rem;
            color: var(--ink-subtle);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .footer-link {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            color: var(--ink-main);
            text-decoration: none;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .footer-link:hover {
            color: var(--ink-subtle);
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
        }


        .orb {
            fill: var(--accent-matcha);
            filter: blur(40px);
            opacity: 0.8;
            mix-blend-mode: screen;
            animation: float 15s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        @keyframes drawLine {
            from {
                stroke-dashoffset: 4000;
            }

            to {
                stroke-dashoffset: 0;
            }
        }

        .draw-anim {
            stroke-dasharray: 4000;
            stroke-dashoffset: 4000;
            animation: drawLine 2.5s ease-out forwards;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = height + 10;
                this.size = Math.random() * 1.5 + 0.5;
                this.speed = Math.random() * 0.4 + 0.1;
                this.opacity = Math.random() * 0.5;
                this.drift = (Math.random() - 0.5) * 0.2;
            }

            update() {
                this.y -= this.speed;
                this.x += this.drift;

                if (this.y < -10) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(75, 0, 130, ${this.opacity})`;
                ctx.fill();
            }
        }

        function init() {
            resize();
            particles = [];
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle());
                particles[i].y = Math.random() * height;
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        init();
        animate();
        window.addEventListener('resize', init);
    </script>
