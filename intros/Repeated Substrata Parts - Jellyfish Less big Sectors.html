<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">Interlinked &amp; Intertwined - Chapters</title>
    <script src="https://cdn.tailwindcss.com/3.4.17" vid="5"></script>
    <style vid="6">
        @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&display=swap');

        :root {
            --bg-void: #121212;
            --text-primary: #d1d1d1;
            --accent-gold: #e6b97e;
            --accent-glow: rgba(230, 185, 126, 0.4);
            --font-serif: 'Shippori Mincho', serif;
        }

        body {
            background-color: var(--bg-void);
            color: var(--text-primary);
            font-family: var(--font-serif);
            margin: 0;
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
        }

        #mycelium-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .content-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 4rem;
        }

        .header {
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
        }

        .header h2 {
            font-size: 1.5rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.6;
            letter-spacing: 0.1em;
        }

        .nodes-container {
            flex: 1;
            position: relative;
            width: 100%;
        }

        .chapter-node {
            position: absolute;
            cursor: pointer;
            transition: transform 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .node-circle {
            width: 12px;
            height: 12px;
            background: var(--accent-gold);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-glow);
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .node-label {
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            text-align: center;
            white-space: nowrap;
            opacity: 0.7;
            transition: all 0.3s ease;
        }

        .chapter-node:hover .node-circle {
            transform: scale(1.5);
            box-shadow: 0 0 25px var(--accent-gold);
        }

        .chapter-node:hover .node-label {
            opacity: 1;
            color: var(--accent-gold);
            transform: translateY(5px);
        }

        .aura-small {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(230, 185, 126, 0.1) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: breathe 8s ease-in-out infinite;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.2; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.5; }
        }

        .nav-back {
            position: fixed;
            bottom: 3rem;
            left: 3rem;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-primary);
            opacity: 0.5;
            text-decoration: none;
            transition: opacity 0.3s ease;
            z-index: 30;
        }

        .nav-back:hover {
            opacity: 1;
            color: var(--accent-gold);
        }

        
        #node-1 { top: 15%; left: 20%; }
        #node-2 { top: 45%; left: 10%; }
        #node-3 { top: 25%; left: 55%; }
        #node-4 { top: 65%; left: 40%; }
        #node-5 { top: 40%; left: 80%; }
        #node-6 { top: 75%; left: 75%; }
        #node-7 { top: 10%; left: 85%; }

    </style>
</head>
<body vid="7">

    <svg id="mycelium-layer" xmlns="http://www.w3.org/2000/svg" vid="8">
        <defs vid="9">
            <filter id="glow-filter" x="-50%" y="-50%" width="200%" height="200%" vid="10">
                <feGaussianBlur stdDeviation="2.5" result="coloredBlur" vid="11"></feGaussianBlur>
                <feMerge vid="12">
                    <feMergeNode in="coloredBlur" vid="13"></feMergeNode>
                    <feMergeNode in="SourceGraphic" vid="14"></feMergeNode>
                </feMerge>
            </filter>
        </defs>
    </svg>

    <main class="content-layer" vid="15">
        <header class="header" vid="16">
            <h2 vid="17">Substrata</h2>
            <p vid="18">Select a node to explore the connections.</p>
        </header>

        <div class="nodes-container" vid="19">
            <div class="chapter-node fade-in" id="node-1" style="animation-delay: 0.2s;" vid="20">
                <div class="aura-small" vid="21"></div>
                <div class="node-circle" vid="22"></div>
                <span class="node-label" vid="23">I. ORIGIN</span>
            </div>

            <div class="chapter-node fade-in" id="node-2" style="animation-delay: 0.4s;" vid="24">
                <div class="aura-small" vid="25"></div>
                <div class="node-circle" vid="26"></div>
                <span class="node-label" vid="27">II. FILAMENTS</span>
            </div>

            <div class="chapter-node fade-in" id="node-3" style="animation-delay: 0.6s;" vid="28">
                <div class="aura-small" vid="29"></div>
                <div class="node-circle" vid="30"></div>
                <span class="node-label" vid="31">III. SYMBIOSIS</span>
            </div>

            <div class="chapter-node fade-in" id="node-4" style="animation-delay: 0.8s;" vid="32">
                <div class="aura-small" vid="33"></div>
                <div class="node-circle" vid="34"></div>
                <span class="node-label" vid="35">IV. DECAY</span>
            </div>

            <div class="chapter-node fade-in" id="node-5" style="animation-delay: 1.0s;" vid="36">
                <div class="aura-small" vid="37"></div>
                <div class="node-circle" vid="38"></div>
                <span class="node-label" vid="39">V. EMERGENCE</span>
            </div>

            <div class="chapter-node fade-in" id="node-6" style="animation-delay: 1.2s;" vid="40">
                <div class="aura-small" vid="41"></div>
                <div class="node-circle" vid="42"></div>
                <span class="node-label" vid="43">VI. RESONANCE</span>
            </div>

            <div class="chapter-node fade-in" id="node-7" style="animation-delay: 1.4s;" vid="44">
                <div class="aura-small" vid="45"></div>
                <div class="node-circle" vid="46"></div>
                <span class="node-label" vid="47">VII. VOID</span>
            </div>
        </div>

        <a href="#" class="nav-back" vid="48">← Return to Center</a>
    </main>

    <script vid="49">
        const svgCanvas = document.getElementById('mycelium-layer');
        const nodes = document.querySelectorAll('.chapter-node');
        
        const CONFIG = {
            maxPaths: 40,
            color: '#e6b97e',
            strokeWidth: { min: 0.3, max: 1.2 },
            opacity: { min: 0.15, max: 0.5 },
            growthSpeed: 0.005,
            lifeSpan: { min: 300, max: 800 }
        };

        let activePaths = [];

        const random = (min, max) => Math.random() * (max - min) + min;

        function getCenter(element) {
            const rect = element.querySelector('.node-circle').getBoundingClientRect();
            return {
                x: rect.left + rect.width / 2,
                y: rect.top + rect.height / 2
            };
        }

        class MyceliumPath {
            constructor() {
                this.element = document.createElementNS("http://www.w3.org/2000/svg", "path");
                this.phase = 'growing'; 
                this.progress = 0;
                this.life = random(CONFIG.lifeSpan.min, CONFIG.lifeSpan.max);
                this.width = random(CONFIG.strokeWidth.min, CONFIG.strokeWidth.max);
                this.opacity = random(CONFIG.opacity.min, CONFIG.opacity.max);
                
                this.initPoints();
                
                this.element.setAttribute("fill", "none");
                this.element.setAttribute("stroke", CONFIG.color);
                this.element.setAttribute("stroke-width", this.width);
                this.element.setAttribute("stroke-opacity", this.opacity);
                this.element.setAttribute("stroke-linecap", "round");
                this.element.setAttribute("filter", "url(#glow-filter)");
                
                svgCanvas.appendChild(this.element);
            }

            initPoints() {
                const nodeIndices = Array.from({length: nodes.length}, (_, i) => i);
                const i1 = nodeIndices[Math.floor(Math.random() * nodeIndices.length)];
                nodeIndices.splice(i1, 1);
                const i2 = nodeIndices[Math.floor(Math.random() * nodeIndices.length)];

                this.start = getCenter(nodes[i1]);
                this.end = getCenter(nodes[i2]);

                this.start.x += random(-5, 5);
                this.start.y += random(-5, 5);
                this.end.x += random(-5, 5);
                this.end.y += random(-5, 5);

                this.cpOffsets = {
                    cp1x: random(-80, 80),
                    cp1y: random(-80, 80),
                    cp2x: random(-80, 80),
                    cp2y: random(-80, 80),
                    freq: random(0.0005, 0.002),
                    amp: random(30, 60)
                };
            }

            update(time) {
                const dx = this.end.x - this.start.x;
                const dy = this.end.y - this.start.y;
                
                const noise1 = Math.sin(time * this.cpOffsets.freq) * this.cpOffsets.amp;
                const noise2 = Math.cos(time * this.cpOffsets.freq) * this.cpOffsets.amp;

                const cp1x = this.start.x + dx * 0.33 + this.cpOffsets.cp1x + noise1;
                const cp1y = this.start.y + dy * 0.33 + this.cpOffsets.cp1y + noise2;
                const cp2x = this.start.x + dx * 0.66 + this.cpOffsets.cp2x - noise1;
                const cp2y = this.start.y + dy * 0.66 + this.cpOffsets.cp2y - noise2;

                const d = `M ${this.start.x} ${this.start.y} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${this.end.x} ${this.end.y}`;
                this.element.setAttribute("d", d);

                const length = this.element.getTotalLength();
                this.element.style.strokeDasharray = length;

                if (this.phase === 'growing') {
                    this.progress += CONFIG.growthSpeed;
                    if (this.progress >= 1) {
                        this.progress = 1;
                        this.phase = 'sustained';
                    }
                } else if (this.phase === 'sustained') {
                    this.life--;
                    if (this.life <= 0) this.phase = 'dying';
                } else if (this.phase === 'dying') {
                    this.progress -= CONFIG.growthSpeed * 2; 
                    if (this.progress <= 0) this.dead = true;
                }

                this.element.style.strokeDashoffset = length * (1 - this.progress);
            }

            destroy() {
                if (this.element.parentNode) this.element.parentNode.removeChild(this.element);
            }
        }

        function animate() {
            const time = Date.now();
            for (let i = activePaths.length - 1; i >= 0; i--) {
                if (activePaths[i].dead) {
                    activePaths[i].destroy();
                    activePaths.splice(i, 1);
                }
            }
            if (activePaths.length < CONFIG.maxPaths && Math.random() < 0.15) {
                activePaths.push(new MyceliumPath());
            }
            activePaths.forEach(path => path.update(time));
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            activePaths.forEach(p => p.destroy());
            activePaths = [];
        });

        setTimeout(animate, 500);
    </script>

</body></html>
