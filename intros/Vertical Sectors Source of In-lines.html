<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">The Alchemy of Decay - Mycelial Network Map</title>
    <script src="https://cdn.tailwindcss.com/3.4.17" vid="5"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" vid="6">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" vid="7">
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&amp;family=Zen+Kaku+Gothic+New:wght@300;400;500&amp;display=swap" rel="stylesheet" vid="8">
    <style vid="9">
        :root {
            --bg-paper: #08090a;
            --bg-panel: #0d0f10;
            --text-ink: #e0e0e0;
            --text-meta: #666;
            --accent-mycelium: #8da376; 
            --font-serif: 'Shippori Mincho', serif;
            --font-sans: 'Zen Kaku Gothic New', sans-serif;
        }

        body {
            background-color: var(--bg-paper);
            color: var(--text-ink);
            font-family: var(--font-serif);
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 1280px;
            height: 960px;
            border-radius: 20px;
            -webkit-font-smoothing: antialiased;
            display: flex;
        }

        .split-left {
            width: 50%;
            height: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid rgba(141, 163, 118, 0.1);
        }

        .split-right {
            width: 50%;
            height: 100%;
            background-color: var(--bg-panel);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 80px;
        }

        .forest-texture {
            position: absolute;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            filter: grayscale(100%) brightness(15%) blur(4px);
            opacity: 0.7;
            z-index: 1;
        }

        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, #08090a 100%);
            z-index: 2;
        }

        .main-title {
            font-size: 4.5rem;
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -0.02em;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .main-subtitle {
            font-style: italic;
            font-size: 1rem;
            color: var(--accent-mycelium);
            max-width: 380px;
            margin-top: 1.5rem;
            opacity: 0.8;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        #network-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .node-list-item {
            position: relative;
            margin: 1.5rem 0;
            padding: 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            text-decoration: none;
            transition: all 0.4s ease;
            z-index: 20;
        }

        .node-dot {
            width: 10px;
            height: 10px;
            background-color: var(--accent-mycelium);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(141, 163, 118, 0.4);
            transition: all 0.4s ease;
            flex-shrink: 0;
        }

        .node-list-item:hover .node-dot {
            background-color: #ffd79d;
            box-shadow: 0 0 20px rgba(255, 215, 157, 0.8);
            transform: scale(1.3);
        }

        .node-content {
            display: flex;
            flex-direction: column;
        }

        .node-part {
            font-family: var(--font-sans);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--accent-mycelium);
            margin-bottom: 0.1rem;
        }

        .node-title {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            color: var(--text-ink);
            transition: transform 0.3s ease;
        }

        .node-list-item:hover .node-title {
            transform: translateX(8px);
        }

        @keyframes flowPulse {
            0% { stroke-dashoffset: 1000; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.6; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }

        .flow-line {
            stroke-dasharray: 60 940;
            animation: flowPulse linear infinite;
        }

        .search-toggle {
            position: absolute;
            top: 2rem;
            right: 2rem;
            z-index: 60;
            background: transparent;
            border: 1px solid rgba(141, 163, 118, 0.2);
            color: var(--accent-mycelium);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        #search-overlay {
            position: absolute;
            inset: 0;
            background: rgba(8, 9, 10, 0.95);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #search-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body vid="10">

    <div class="split-left" vid="11">
        <div class="forest-texture" vid="12"></div>
        <div class="vignette" vid="13"></div>
        <div class="center-content" id="main-hero" vid="14">
            <h1 class="main-title text-glow" vid="15">The Alchemy<br vid="16">of Decay</h1>
            <p class="main-subtitle" vid="17">"In the dark of the forest floor, ideas decompose into the richness of tomorrow's insight."</p>
        </div>
    </div>

    <div class="split-right" vid="18">
        <svg id="network-canvas" vid="19"></svg>
        
        <div id="nodes-list" vid="20">
            
        </div>

        <div class="absolute bottom-10 left-20 z-30 pointer-events-none" vid="21">
            <span class="font-sans text-[0.55rem] uppercase tracking-[0.3em] text-[#666] opacity-60" vid="22">Select a node to traverse the network</span>
        </div>
    </div>

    <button class="search-toggle" onclick="toggleSearch()" vid="23">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vid="24"><circle cx="11" cy="11" r="8" vid="25"></circle><line x1="21" y1="21" x2="16.65" y2="16.65" vid="26"></line></svg>
    </button>

    <div id="search-overlay" vid="27">
        <div class="max-w-md w-full px-8 text-center" vid="28">
             <input type="text" class="bg-transparent border-b border-[#8da376]/30 w-full py-4 text-2xl font-serif outline-none focus:border-[#8da376]" placeholder="Seek within the network..." vid="29">
             <div class="mt-8 flex flex-wrap gap-2 justify-center" vid="30">
                <span class="text-[0.6rem] tracking-widest border border-[#8da376]/20 px-3 py-1 rounded-full uppercase text-[#8da376]" vid="31">All Nodes</span>
                <span class="text-[0.6rem] tracking-widest border border-[#8da376]/20 px-3 py-1 rounded-full uppercase text-[#8da376]" vid="32">Fungal Rituals</span>
             </div>
        </div>
    </div>

    <script vid="33">
        function toggleSearch() {
            const overlay = document.getElementById('search-overlay');
            overlay.classList.toggle('active');
        }

        const nodesData = [
            { id: 'n1', part: 'PART I', title: 'The Void' },
            { id: 'n2', part: 'PART II', title: 'Enter Archive' },
            { id: 'n3', part: 'PART III', title: 'Connections' },
            { id: 'n4', part: 'PART IV', title: 'Current Folio' },
            { id: 'n5', part: 'PART V', title: 'Echoes' },
            { id: 'n6', part: 'PART VI', title: 'Infinite Bloom' }
        ];

        function initLayout() {
            const listContainer = document.getElementById('nodes-list');
            const svg = document.getElementById('network-canvas');
            
            nodesData.forEach((node, index) => {
                const item = document.createElement('a');
                item.href = "#";
                item.className = "node-list-item";
                item.id = `item-${node.id}`;
                item.innerHTML = `
                    <div class="node-dot"></div>
                    <div class="node-content">
                        <span class="node-part">${node.part}</span>
                        <span class="node-title">${node.title}</span>
                    </div>
                `;
                listContainer.appendChild(item);

                
                const rect = item.getBoundingClientRect();
                const centerY = rect.top + (rect.height / 2) - 0; 
                const svgHeight = 960;
                const nodeY = (index * 85) + 260; 
                
                
                for(let i=0; i<4; i++) {
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    const startX = -100; 
                    const startY = 480 + (Math.random() - 0.5) * 400;
                    const endX = 85; 
                    const endY = nodeY;

                    const cp1x = 100;
                    const cp1y = startY;
                    const cp2x = 0;
                    const cp2y = endY;

                    const d = `M ${startX} ${startY} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${endX} ${endY}`;
                    
                    path.setAttribute('d', d);
                    path.setAttribute('fill', 'none');
                    path.setAttribute('stroke', '#8da376');
                    path.setAttribute('stroke-width', '0.5');
                    path.setAttribute('opacity', '0.1');
                    svg.appendChild(path);

                    
                    const flow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    flow.setAttribute('d', d);
                    flow.setAttribute('fill', 'none');
                    flow.setAttribute('stroke', '#8da376');
                    flow.setAttribute('stroke-width', '0.8');
                    flow.classList.add('flow-line');
                    flow.style.animationDuration = (3 + Math.random() * 5) + 's';
                    flow.style.animationDelay = (Math.random() * -5) + 's';
                    svg.appendChild(flow);
                }
            });
        }

        window.onload = initLayout;
    </script>
</body></html>
